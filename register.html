<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SI-HATI — Daftar</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="navbar-top"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
          <circle cx="22" cy="22" r="21" stroke="#4E6245" stroke-width="1.4" fill="#C8D5BE"/>
          <path d="M12 28 Q16 16 22 21 Q28 26 32 14" stroke="#4E6245" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="22" cy="12" r="3" fill="#4E6245" opacity="0.7"/>
        </svg>
      </div>
      <h2 class="auth-brand">SI-HATI</h2>
      <p class="auth-sub">Buat akun baru dan mulai perjalananmu.</p>
    </div>

    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" placeholder="Masukkan username" required/>
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="Masukkan email" required/>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <div class="input-wrap">
          <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required/>
          <button type="button" class="toggle-pw" onclick="togglePw('regPassword')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A9E80" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="regConfirm">Konfirmasi Password</label>
        <div class="input-wrap">
          <input type="password" id="regConfirm" placeholder="Ulangi password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw('regConfirm')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A9E80" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <p class="error-msg" id="regError"></p>
      <button type="submit" class="btn-auth">Daftar Sekarang</button>
      <p class="auth-switch">Sudah punya akun? <a href="login.html">Masuk</a></p>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    if (isLoggedIn()) window.location.href = "index.html";
  });

  function togglePw(id) {
    var inp = document.getElementById(id);
    inp.type = inp.type === "password" ? "text" : "password";
  }

  document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();
    var username = document.getElementById("regUsername").value.trim();
    var email    = document.getElementById("regEmail").value.trim();
    var password = document.getElementById("regPassword").value;
    var confirm  = document.getElementById("regConfirm").value;
    var errEl    = document.getElementById("regError");

    // Validasi
    if (username.length < 3) {
      errEl.textContent = "Username minimal 3 karakter.";
      errEl.classList.add("show"); return;
    }
    if (password.length < 6) {
      errEl.textContent = "Password minimal 6 karakter.";
      errEl.classList.add("show"); return;
    }
    if (password !== confirm) {
      errEl.textContent = "Password dan konfirmasi tidak sama.";
      errEl.classList.add("show"); return;
    }

    // Cek apakah email sudah terdaftar
    var rawAccounts = localStorage.getItem("sihati_accounts");
    var accounts = rawAccounts ? JSON.parse(rawAccounts) : [];
    if (accounts.find(function(a){ return a.email === email; })) {
      errEl.textContent = "Email sudah terdaftar. Silakan masuk.";
      errEl.classList.add("show"); return;
    }

    errEl.classList.remove("show");

    // Simpan akun baru
    accounts.push({ username: username, email: email, password: password });
    localStorage.setItem("sihati_accounts", JSON.stringify(accounts));

    // Langsung login setelah daftar
    sessionSave(email, username);

    showToast("Akun berhasil dibuat! Selamat datang, " + username + "!");
    setTimeout(function() {
      window.location.href = "index.html";
    }, 1000);
  });
</script>
</body>
</html>
