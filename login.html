<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SI-HATI — Masuk</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="navbar-top"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
          <circle cx="22" cy="22" r="21" stroke="#4E6245" stroke-width="1.4" fill="#C8D5BE"/>
          <path d="M12 28 Q16 16 22 21 Q28 26 32 14" stroke="#4E6245" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="22" cy="12" r="3" fill="#4E6245" opacity="0.7"/>
        </svg>
      </div>
      <h2 class="auth-brand">SI-HATI</h2>
      <p class="auth-sub">We missed you! Please enter your details.</p>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your Email" required/>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <div class="input-wrap">
          <input type="password" id="loginPassword" placeholder="Enter Password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw('loginPassword')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A9E80" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-row">
        <label class="check-label">
          <input type="checkbox" id="rememberMe"/>
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>
      <p class="error-msg" id="loginError">Email atau password salah.</p>
      <button type="submit" class="btn-auth">Sign in</button>
      <div class="divider"><span>atau</span></div>
      <a href="#" class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>
      <p class="auth-switch">Belum punya akun? <a href="register.html">Daftar</a></p>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  // Kalau sudah login, langsung ke beranda
  document.addEventListener("DOMContentLoaded", function() {
    if (isLoggedIn()) {
      window.location.href = "index.html";
    }
  });

  function togglePw(id) {
    var inp = document.getElementById(id);
    inp.type = inp.type === "password" ? "text" : "password";
  }

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    var email    = document.getElementById("loginEmail").value.trim();
    var password = document.getElementById("loginPassword").value;
    var errEl    = document.getElementById("loginError");

    // Ambil data akun yang pernah register dari localStorage
    var rawAccounts = localStorage.getItem("sihati_accounts");
    var accounts = rawAccounts ? JSON.parse(rawAccounts) : [];

    // Cari akun yang cocok
    var found = accounts.find(function(a) {
      return a.email === email && a.password === password;
    });

    if (!found) {
      errEl.classList.add("show");
      return;
    }
    errEl.classList.remove("show");

    // Simpan session
    sessionSave(email, found.username);

    // Redirect ke halaman yang dituju sebelumnya (jika ada)
    var redirect = localStorage.getItem("sihati_redirect");
    localStorage.removeItem("sihati_redirect");
    window.location.href = redirect || "index.html";
  });

  function loginGoogle() {
    // Demo: simulasi login Google
    var email = "demouser@gmail.com";
    var username = "Demo User";
    sessionSave(email, username);

    // Simpan ke accounts jika belum ada
    var rawAccounts = localStorage.getItem("sihati_accounts");
    var accounts = rawAccounts ? JSON.parse(rawAccounts) : [];
    if (!accounts.find(function(a){ return a.email === email; })) {
      accounts.push({ email: email, username: username, password: "" });
      localStorage.setItem("sihati_accounts", JSON.stringify(accounts));
    }

    var redirect = localStorage.getItem("sihati_redirect");
    localStorage.removeItem("sihati_redirect");
    window.location.href = redirect || "index.html";
  }
</script>
</body>
</html>
